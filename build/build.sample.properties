;; =============================================================================
;; Grafida — private build configuration (SAMPLE)
;; =============================================================================
;;
;; Copy this file to build/build.properties and fill in your own values:
;;
;;     cp build/build.sample.properties build/build.properties
;;
;; build/build.properties is gitignored — it holds secrets and is NEVER
;; committed. build.xml loads it automatically; a missing file is tolerated, so
;; targets that don't need these properties keep working without it.
;;
;; This is the plumbing for publishing a release to GitHub Releases and then
;; uploading the update information to our CDN (the update mechanism itself is
;; not built yet — these properties are the prerequisite).

; ------------------------------------------------------------------------------
; GitHub Releases
; ------------------------------------------------------------------------------
; The GitHub organisation or user the repository lives under, e.g. "akeeba"
github.organization=akeeba
; The GitHub repository name, e.g. "grafida"
github.repository=grafida
; A GitHub Personal Access Token (PAT) with permission to create releases on the
; repository. Generate one at https://github.com/settings/tokens
github.token=yourGitHubTokenHere

; ------------------------------------------------------------------------------
; CDN upload (FTP) — where the update information is published
; ------------------------------------------------------------------------------
; FTP hostname of the CDN storage, e.g. storage.bunnycdn.com
cdn.ftp.hostname=storage.example.com
; FTP username for the CDN storage
cdn.ftp.username=myusername
; FTP password for the CDN storage
cdn.ftp.password=mypassword
; Directory on the CDN storage where the update information is uploaded
cdn.ftp.directory=/grafida/updates

; ------------------------------------------------------------------------------
; macOS code signing & notarisation — see build/readme/01-macos-signing.md
; ------------------------------------------------------------------------------
; Leave both blank for local dev builds (the app is ad-hoc signed and runs
; locally, but cannot be notarised/distributed). Fill them in to sign + notarise
; the distributable .app/.dmg during 'phing package' / release.
;
; The "Developer ID Application" signing identity, exactly as shown by
;   security find-identity -v -p codesigning
; e.g. Developer ID Application: Your Name (ABCDE12345)
macos.sign.identity=
; The notarytool keychain profile name created with
;   xcrun notarytool store-credentials "grafida-notary" --apple-id … --team-id … --password …
; When set (and macos.sign.identity is set), the DMG is submitted to Apple and
; the notarisation ticket is stapled.
macos.notary.profile=
