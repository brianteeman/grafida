  Monochrome, fill-only derivative of grafida.svg, meant solely for building a
  custom icon font (FontForge). FontForge's SVG importer rejects strokes,
  gradients, transforms and defs ("bad image file"), so everything is baked
  down to a single filled path here: the strokes are expanded to outlines, the
  pencil's transform is applied to the coordinates, the shiny blue background
  is dropped, and the pencil is knocked out of the "J" so the two stay legible
  in one colour. Not used by the app or by scripts/make-icons.sh; if the master
  artwork changes, this file has to be rebuilt from it.
-->
