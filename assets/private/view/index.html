<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Grafida</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto+Condensed:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/fontawesome.min.css">
    <link rel="stylesheet" href="/css/solid.min.css">
    <link rel="stylesheet" href="/js/codemirror/lib/codemirror.min.css">
    <link rel="stylesheet" href="/js/codemirror/theme/material-darker.min.css">
    <link rel="stylesheet" href="/css/app.css">
    <script src="/js/tinymce/tinymce.min.js" referrerpolicy="origin"></script>
</head>
<body>

<div id="app">

    <!-- ========== SIDEBAR ========== -->
    <aside id="sidebar">
        <div id="sidebar-header">
            <div class="sidebar-header-titles">
                <h1>Grafida</h1>
                <div class="subtitle" data-i18n="GRAFIDA_APP_SUBTITLE">Desktop Article Editor for Joomla®</div>
            </div>
            <button id="sidebar-toggle" type="button" class="icon-toggle"
                    aria-label="Toggle sidebar" data-i18n-title="GRAFIDA_BTN_TOGGLE_SIDEBAR">
                <i class="fa-solid fa-angles-left" aria-hidden="true"></i>
            </button>
        </div>

        <div id="site-selector">
            <select id="site-select" aria-label="Select site"></select>
            <div id="sidebar-site-favicon"></div>
        </div>

        <nav id="main-nav" aria-label="Main navigation">
            <a data-screen="sites" href="#" role="menuitem">
                <i class="nav-icon fa-solid fa-globe" aria-hidden="true"></i>
                <span data-i18n="GRAFIDA_NAV_SITES">Sites</span>
            </a>
            <a data-screen="articles" href="#" role="menuitem">
                <i class="nav-icon fa-solid fa-file-lines" aria-hidden="true"></i>
                <span data-i18n="GRAFIDA_NAV_ARTICLES">Articles</span>
            </a>
            <a data-screen="media" href="#" role="menuitem">
                <i class="nav-icon fa-solid fa-photo-film" aria-hidden="true"></i>
                <span data-i18n="GRAFIDA_NAV_MEDIA">Media Manager</span>
            </a>
            <a data-screen="settings" href="#" role="menuitem">
                <i class="nav-icon fa-solid fa-gear" aria-hidden="true"></i>
                <span data-i18n="GRAFIDA_NAV_SETTINGS">Settings</span>
            </a>
        </nav>

        <div id="sidebar-update" hidden></div>

        <button id="sidebar-footer" type="button">
            <i class="fa-solid fa-circle-info" aria-hidden="true"></i>
            <span id="sidebar-version"></span>
        </button>
    </aside>

    <!-- ========== MAIN CONTENT ========== -->
    <div id="content">

        <!-- ===== SITES SCREEN ===== -->
        <section id="sites-screen" class="screen" role="main">
            <div class="screen-header">
                <h2 data-i18n="GRAFIDA_NAV_SITES">Sites</h2>
                <button id="btn-add-site" class="btn btn-primary">
                    <i class="fa-solid fa-plus" aria-hidden="true"></i>
                    <span data-i18n="GRAFIDA_BTN_ADD_SITE">Add Site</span>
                </button>
            </div>
            <div id="sites-list"></div>
        </section>

        <!-- ===== ARTICLES SCREEN ===== -->
        <section id="articles-screen" class="screen" role="main">
            <div class="screen-header">
                <h2 data-i18n="GRAFIDA_NAV_ARTICLES">Articles</h2>
                <div id="articles-toolbar">
                    <button id="btn-import-draft" class="btn btn-secondary" disabled>
                        <i class="fa-solid fa-file-import" aria-hidden="true"></i>
                        <span data-i18n="GRAFIDA_BTN_IMPORT_DRAFT">Import from file…</span>
                    </button>
                    <button id="btn-new-article" class="btn btn-primary" disabled>
                        <i class="fa-solid fa-file-circle-plus" aria-hidden="true"></i>
                        <span data-i18n="GRAFIDA_BTN_NEW_ARTICLE">New Article</span>
                    </button>
                </div>
            </div>
            <div id="articles-container"></div>
        </section>

        <!-- ===== MEDIA MANAGER SCREEN ===== -->
        <section id="media-screen" class="screen" role="main">
            <div class="screen-header">
                <h2 data-i18n="GRAFIDA_NAV_MEDIA">Media Manager</h2>
                <div id="media-header-actions" class="btn-group"></div>
            </div>
            <div id="media-container"></div>
        </section>

        <!-- ===== EDITOR SCREEN ===== -->
        <section id="editor-screen" class="screen" role="main">
            <div id="editor-layout">

                <!-- Editor main column -->
                <div id="editor-main">
                    <div id="editor-toolbar">
                        <button id="btn-back-to-articles" class="btn btn-secondary btn-sm">
                            <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
                            <span data-i18n="GRAFIDA_BTN_BACK">Back</span>
                        </button>
                        <button id="btn-import-md" class="btn btn-secondary btn-sm">
                            <i class="fa-solid fa-file-import" aria-hidden="true"></i>
                            <span data-i18n="GRAFIDA_BTN_IMPORT_MD">Import Markdown</span>
                        </button>
                        <button id="btn-export-draft" class="btn btn-secondary btn-sm">
                            <i class="fa-solid fa-file-export" aria-hidden="true"></i>
                            <span data-i18n="GRAFIDA_BTN_EXPORT_DRAFT">Export…</span>
                        </button>
                        <button id="btn-replace-draft" class="btn btn-secondary btn-sm">
                            <i class="fa-solid fa-file-arrow-up" aria-hidden="true"></i>
                            <span data-i18n="GRAFIDA_BTN_REPLACE_DRAFT">Replace from file…</span>
                        </button>
                        <div class="btn-group">
                            <button id="btn-save-draft" class="btn btn-secondary">
                                <i class="fa-solid fa-floppy-disk" aria-hidden="true"></i>
                                <span data-i18n="GRAFIDA_BTN_SAVE">Save</span>
                            </button>
                            <button id="btn-publish" class="btn btn-primary">
                                <i class="fa-solid fa-cloud-arrow-up" aria-hidden="true"></i>
                                <span data-i18n="GRAFIDA_BTN_PUBLISH">Publish</span>
                            </button>
                        </div>
                    </div>

                    <div id="editor-title-bar">
                        <input id="editor-title-input" type="text" placeholder="Article title…" autocomplete="off">
                        <div id="editor-alias-group">
                            <input id="editor-alias-input" type="text" class="editor-alias-input"
                                   data-i18n-placeholder="GRAFIDA_PLACEHOLDER_ALIAS" autocomplete="off" spellcheck="false">
                            <button id="btn-regenerate-alias" type="button" class="editor-alias-addon editor-alias-btn"
                                    data-i18n-title="GRAFIDA_BTN_REGENERATE_ALIAS">
                                <i class="fa-solid fa-arrows-rotate" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>

                    <div id="tinymce-wrapper">
                        <textarea id="tinymce-editor"></textarea>
                    </div>
                </div>

                <!-- Editor metadata sidebar -->
                <aside id="editor-sidebar" aria-label="Article metadata">
                    <div id="editor-sidebar-header">
                        <span class="editor-sidebar-title" data-i18n="GRAFIDA_LBL_ARTICLE_PROPERTIES">Article properties</span>
                        <button id="editor-sidebar-toggle" type="button" class="icon-toggle"
                                aria-label="Toggle article properties" data-i18n-title="GRAFIDA_BTN_TOGGLE_PROPERTIES">
                            <i class="fa-solid fa-angles-right" aria-hidden="true"></i>
                        </button>
                    </div>
                    <div id="editor-sidebar-inner"></div>
                </aside>

                <!-- AI assistant panel (toggled by the TinyMCE toolbar buttons) -->
                <aside id="ai-panel" class="hidden" aria-label="AI Assistant">

                    <!-- Drag handle on the panel's left edge to resize its width -->
                    <div id="ai-panel-resizer" role="separator" aria-orientation="vertical" aria-hidden="true"></div>

                    <!-- Panel header: title + New chat / Close actions -->
                    <header id="ai-panel-header">
                        <span class="ai-panel-header-title">
                            <i class="fa-solid fa-wand-magic-sparkles" aria-hidden="true"></i>
                            <span data-i18n="GRAFIDA_BTN_AI_ASSISTANT">AI Assistant</span>
                        </span>
                        <span class="ai-panel-header-actions">
                            <button id="ai-btn-new" type="button" class="btn btn-secondary btn-sm">
                                <i class="fa-solid fa-plus" aria-hidden="true"></i>
                                <span data-i18n="GRAFIDA_BTN_NEW_CHAT">New chat</span>
                            </button>
                            <button id="ai-btn-close" type="button" class="btn btn-secondary btn-sm" aria-label="Close">
                                <i class="fa-solid fa-xmark" aria-hidden="true"></i>
                            </button>
                        </span>
                    </header>

                    <!-- Step 8: AI Chats banner — hidden until Step 8 populates it -->
                    <div id="ai-chats-section" class="hidden">
                        <div class="ai-panel-section-title" data-i18n="GRAFIDA_LBL_AI_CHATS">AI Chats</div>
                        <div id="ai-chats-list"></div>
                    </div>

                    <!-- Scrollable conversation area -->
                    <div id="ai-conversation"></div>

                    <!-- Input row: textarea + Send / Stop buttons -->
                    <div id="ai-input-row">
                        <textarea id="ai-input" class="form-control" rows="3"></textarea>
                        <div id="ai-input-actions">
                            <button id="ai-btn-stop" type="button" class="btn btn-secondary btn-sm hidden">
                                <i class="fa-solid fa-stop" aria-hidden="true"></i>
                                <span data-i18n="GRAFIDA_BTN_STOP">Stop</span>
                            </button>
                            <button id="ai-btn-send" type="button" class="btn btn-primary btn-sm">
                                <i class="fa-solid fa-paper-plane" aria-hidden="true"></i>
                                <span data-i18n="GRAFIDA_BTN_SEND">Send</span>
                            </button>
                        </div>
                    </div>

                </aside>

            </div>
        </section>

        <!-- ===== SETTINGS SCREEN ===== -->
        <section id="settings-screen" class="screen" role="main">
            <div class="screen-header">
                <h2 data-i18n="GRAFIDA_LBL_SETTINGS">Settings</h2>
            </div>
            <div class="card settings-card">
                <p class="card-title" data-i18n="GRAFIDA_LBL_UI_LANGUAGE">Interface Language</p>
                <div class="form-group">
                    <label for="settings-language-select" data-i18n="GRAFIDA_LBL_UI_LANGUAGE">Language</label>
                    <select id="settings-language-select" class="form-control"></select>
                </div>
            </div>
            <div class="card settings-card">
                <p class="card-title" data-i18n="GRAFIDA_LBL_DISPLAY_MODE">Display mode</p>
                <div class="form-group">
                    <label for="settings-display-mode-select" data-i18n="GRAFIDA_LBL_DISPLAY_MODE">Display mode</label>
                    <select id="settings-display-mode-select" class="form-control"></select>
                </div>
            </div>
            <div class="card settings-card">
                <p class="card-title" data-i18n="GRAFIDA_LBL_SLASH_TOOLS">Slash commands</p>
                <p class="text-muted" data-i18n="GRAFIDA_MSG_SLASH_TOOLS_INFO"></p>
                <div class="form-group">
                    <label for="settings-slash-tools-select" data-i18n="GRAFIDA_LBL_SLASH_TOOLS">Slash commands</label>
                    <select id="settings-slash-tools-select" class="form-control"></select>
                </div>
            </div>
            <div class="card settings-card">
                <p class="card-title" data-i18n="GRAFIDA_LBL_SPELL_CHECK">Spell checking</p>
                <p class="text-muted" data-i18n="GRAFIDA_MSG_SPELL_CHECK_INFO"></p>
                <div class="form-group">
                    <label for="settings-spell-check-select" data-i18n="GRAFIDA_LBL_SPELL_CHECK">Spell checking</label>
                    <select id="settings-spell-check-select" class="form-control"></select>
                </div>
            </div>
            <div class="card settings-card">
                <p class="card-title" data-i18n="GRAFIDA_LBL_STORAGE">Local storage</p>
                <div class="form-group">
                    <label data-i18n="GRAFIDA_LBL_DB_LOCATION">Database location</label>
                    <code id="settings-db-path" class="db-path"></code>
                </div>
                <div class="settings-actions" id="settings-storage-actions"></div>
            </div>
            <div class="card settings-card settings-danger">
                <p class="card-title" data-i18n="GRAFIDA_LBL_RESET_STORAGE">Reset local storage</p>
                <p class="text-muted" id="settings-reset-desc" data-i18n="GRAFIDA_MSG_RESET_STORAGE_DESC"></p>
                <div class="settings-actions" id="settings-reset-actions"></div>
            </div>
            <div class="card settings-card settings-card-wide" id="settings-ai-services-card">
                <div class="settings-card-head">
                    <p class="card-title" data-i18n="GRAFIDA_LBL_AI_SERVICES">AI Services</p>
                    <div id="settings-ai-services-actions"></div>
                </div>
                <div id="ai-services-list"></div>
            </div>
            <div class="card settings-card settings-card-wide" id="settings-ai-tools-card">
                <p class="card-title" data-i18n="GRAFIDA_LBL_AI_TOOLS">AI Tools</p>
                <div id="ai-system-prompt-section"></div>
                <hr class="divider">
                <div id="ai-tools-list"></div>
            </div>
        </section>

    </div><!-- /#content -->

</div><!-- /#app -->

<!-- ========== MODAL ========== -->
<div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
        <h2 class="modal-title" id="modal-title"></h2>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer" id="modal-footer">
            <button id="btn-modal-close" class="btn btn-secondary">
                <i class="fa-solid fa-xmark" aria-hidden="true"></i>
                <span>Close</span>
            </button>
        </div>
    </div>
</div>

<!-- ========== TOAST CONTAINER ========== -->
<div id="toast-container" aria-live="polite" aria-atomic="false"></div>

<script src="/js/codemirror/lib/codemirror.min.js"></script>
<script src="/js/codemirror/mode/xml/xml.min.js"></script>
<script src="/js/codemirror/mode/javascript/javascript.min.js"></script>
<script src="/js/codemirror/mode/css/css.min.js"></script>
<script src="/js/codemirror/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="/js/codemirror/addon/edit/matchbrackets.min.js"></script>
<script src="/js/codemirror/addon/edit/closetag.min.js"></script>
<script src="/js/ai/providers.js"></script>
<script src="/js/app.js"></script>
<script src="/js/editor/slashtools.js"></script>
<script src="/js/ai/panel.js"></script>
</body>
</html>
